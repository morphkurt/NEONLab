<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ARM Scalar → NEON Dev Tool</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px}

/* ── Header ── */
.hdr{background:#161b22;border-bottom:1px solid #30363d;padding:7px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr h1{font-size:14px;font-weight:700}
.badge{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
.badge.arm{background:#1f6feb;color:#fff}.badge.neon{background:#7c3aed;color:#fff}
.badge.qemu{background:#0f4a0f;border:1px solid #3fb950;color:#3fb950}
.hdr-r{margin-left:auto;display:flex;gap:6px;align-items:center}

/* ── Function tabs ── */
.fn-tabs{background:#0a0d12;border-bottom:1px solid #21262d;display:flex;align-items:center;gap:0;flex-shrink:0;overflow-x:auto}
.fn-tab{padding:6px 14px;border:none;background:transparent;border-bottom:2px solid transparent;color:#6e7681;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px}
.fn-tab.active{color:#e6edf3;border-bottom-color:#1f6feb}
.fn-tab:hover:not(.active){color:#cdd9e5}
.fn-tab .fn-close{color:#484f58;font-size:14px;line-height:1;padding:0 2px;border-radius:3px}
.fn-tab .fn-close:hover{color:#f85149;background:#21262d}
.fn-add{padding:6px 10px;border:none;background:transparent;color:#484f58;font-size:18px;cursor:pointer;line-height:1}
.fn-add:hover{color:#3fb950}

/* ── Sig row ── */
.sig-row{background:#161b22;border-bottom:1px solid #21262d;padding:6px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.sig-label{font-size:10px;color:#484f58;font-weight:700;white-space:nowrap}
.sig-input{flex:1;background:#0d1117;border:1px solid #21262d;border-radius:5px;color:#f0883e;font-family:monospace;font-size:12px;padding:4px 8px;outline:none}
.sig-input:focus{border-color:#f0883e}
.sig-parsed{font-size:10px;color:#6e7681;white-space:nowrap;max-width:340px;overflow:hidden;text-overflow:ellipsis}
.sig-parsed .sp-reg{color:#58a6ff;font-family:monospace;font-weight:700}
.sig-parsed .sp-name{color:#3fb950}
.sig-parsed .sp-ret{color:#a371f7;font-family:monospace}
.sig-err{color:#f85149;font-size:10px}

/* ── Test vector table ── */
.vec-section{background:#0a0d12;border-bottom:1px solid #21262d;flex-shrink:0;max-height:220px;display:flex;flex-direction:column}
.vec-header{display:flex;align-items:center;padding:5px 10px;gap:8px;border-bottom:1px solid #21262d;flex-shrink:0}
.vec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#484f58}
.vec-table-wrap{overflow:auto;flex:1}
table.vt{width:100%;border-collapse:collapse;font-size:11px}
table.vt th{background:#161b22;color:#484f58;font-size:9px;font-weight:700;text-transform:uppercase;padding:4px 8px;text-align:left;border-bottom:1px solid #21262d;white-space:nowrap;position:sticky;top:0}
table.vt td{padding:3px 4px;border-bottom:1px solid #161b22;vertical-align:middle}
table.vt tr:hover td{background:#161b22}
table.vt tr.vt-pass td{background:#0a1a0f}
table.vt tr.vt-fail td{background:#1a0a0a}
.vt-num{color:#484f58;font-family:monospace;text-align:center;width:24px}
.vt-input{background:#0d1117;border:1px solid #21262d;border-radius:3px;color:#e6edf3;font-family:monospace;font-size:11px;padding:2px 5px;width:100%;outline:none;min-width:60px}
.vt-input:focus{border-color:#388bfd}
.vt-expected{background:#0d1117;border:1px solid #21262d;border-radius:3px;color:#f0883e;font-family:monospace;font-size:11px;padding:2px 5px;width:80px;outline:none}
.vt-expected:focus{border-color:#f0883e}
.vt-result{font-family:monospace;font-size:11px;color:#484f58;text-align:left;white-space:nowrap;padding:3px 6px}
.vt-result.ok{color:#3fb950}.vt-result.fail{color:#f85149}
.vt-status{text-align:center;font-size:13px}
.vt-del{background:none;border:none;color:#30363d;cursor:pointer;font-size:14px;padding:0 4px}
.vt-del:hover{color:#f85149}

/* ── Main ── */
.main{display:grid;grid-template-columns:440px 1fr;flex:1;overflow:hidden;min-height:0}

/* ── Editors ── */
.editors{display:flex;flex-direction:column;border-right:1px solid #30363d;overflow:hidden}
.etabs{display:flex;background:#0a0d12;border-bottom:1px solid #21262d;flex-shrink:0}
.etab{flex:1;padding:6px;background:transparent;border:none;border-bottom:2px solid transparent;color:#6e7681;font-size:11px;font-weight:600;cursor:pointer;transition:all .12s}
.etab.active{color:#e6edf3;border-bottom-color:#1f6feb}
.editor-pane{display:none;flex-direction:column;flex:1;overflow:hidden}
.editor-pane.active{display:flex}
.ew{flex:1;display:flex;overflow:hidden;min-height:0;position:relative}
.cur-line-hl{position:absolute;left:32px;right:0;height:18px;background:rgba(31,111,235,0.13);border-left:2px solid #1f6feb;pointer-events:none;display:none;z-index:2;transition:top .08s}
.lnum{width:32px;background:#0a0d12;border-right:1px solid #21262d;color:#484f58;font-family:monospace;font-size:11px;line-height:18px;padding:6px 4px;text-align:right;user-select:none;white-space:pre;overflow:hidden;flex-shrink:0}
textarea.code{flex:1;background:#0d1117;color:#e6edf3;font-family:'JetBrains Mono','Fira Code',monospace;font-size:12px;line-height:18px;padding:6px;border:none;outline:none;resize:none;tab-size:4}
.ctrl-row{display:flex;gap:4px;padding:5px 7px;background:#161b22;border-top:1px solid #21262d;border-bottom:1px solid #21262d;flex-shrink:0;align-items:center}
button{padding:4px 10px;border:1px solid #30363d;border-radius:5px;background:#21262d;color:#e6edf3;cursor:pointer;font-size:11px;font-weight:600;transition:background .12s,border-color .12s;white-space:nowrap}
button:hover{background:#30363d;border-color:#58a6ff}
button.primary{background:#1f6feb;border-color:#1f6feb;color:#fff}
button.primary:hover{background:#388bfd}
button.success{background:#1a4d2a;border-color:#3fb950;color:#3fb950}
button.success:hover{background:#236334}
button.danger{background:#3a1010;border-color:#da3633;color:#f85149}
button.danger:hover{background:#5a1515}
button:disabled{opacity:.35;cursor:not-allowed}
.speed-w{display:flex;align-items:center;gap:3px;margin-left:auto}
.speed-w label{font-size:10px;color:#6e7681}
input[type=range]{width:55px;accent-color:#1f6feb}
.log{height:80px;overflow-y:auto;background:#0a0d12;font-family:monospace;font-size:10px;padding:4px 6px;flex-shrink:0}
.le{line-height:16px;border-bottom:1px solid #161b22;padding:1px 0}
.le .lpc{color:#58a6ff;margin-right:5px}.le .li{color:#cdd9e5}.le .ld{color:#484f58;margin-left:5px}
.le.err{color:#f85149}

/* ── Translation panel ── */
.trans{flex-shrink:0;background:#0a0d12;border-top:1px solid #21262d;max-height:130px;overflow-y:auto}
.trans-hdr{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#484f58;padding:4px 8px;border-bottom:1px solid #161b22;background:#0a0d12;position:sticky;top:0}
.tg{display:grid;grid-template-columns:1fr 1fr}
.tr-row{display:contents}.tr-row:hover .tc{background:#161b22}
.tr-row.hl .tc{background:#0d2535;border-left:2px solid #1f6feb}
.tc{padding:3px 8px;font-size:10px;border-bottom:1px solid #161b22;border-left:1px solid transparent;font-family:monospace}
.tc.sc{color:#58a6ff}.tc.ne{color:#a371f7}
.tc .nt{color:#484f58;font-size:9px;font-family:'Segoe UI',sans-serif}

/* ── State panel ── */
.state-panel{display:flex;flex-direction:column;overflow:hidden}
.stabs{display:flex;background:#0a0d12;border-bottom:1px solid #21262d;flex-shrink:0}
.stab{flex:1;padding:6px;background:transparent;border:none;border-bottom:2px solid transparent;color:#6e7681;font-size:11px;font-weight:600;cursor:pointer;transition:all .12s}
.stab.active{color:#e6edf3;border-bottom-color:#a371f7}
.state-pane{flex:1;overflow-y:auto;padding:10px 12px;display:none}
.state-pane.active{display:block}
.sec{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#484f58;margin:10px 0 5px;display:flex;align-items:center;gap:5px}
.sec:first-child{margin-top:0}.sec::after{content:'';flex:1;height:1px;background:#21262d}

/* ── GP register cards ── */
.gp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.rc{background:#161b22;border:1px solid #21262d;border-radius:5px;padding:5px 6px;cursor:pointer;transition:border-color .2s,background .2s;position:relative}
.rc:hover{border-color:#388bfd}
.rc.changed{border-color:#3fb950;background:#0d2318;animation:gf .35s}
@keyframes gf{0%{background:#1a4a2a}100%{background:#0d2318}}
.rc-head{display:flex;justify-content:space-between;margin-bottom:2px}
.rc-name{font-size:9px;color:#484f58;font-weight:700}
.rc-alias{font-size:8px;color:#30363d}
.rc-lbl{width:100%;background:transparent;border:none;border-bottom:1px dashed #21262d;color:#3fb950;font-size:9px;padding:0 1px;outline:none;margin-bottom:2px}
.rc-lbl::placeholder{color:#21262d}.rc-lbl:focus{border-color:#3fb950}
.rc-hex{font-family:monospace;font-size:11px;color:#58a6ff;font-weight:700}
.rc-dec{font-family:monospace;font-size:9px;color:#30363d;margin-top:1px}

/* ── Tooltip ── */
.tooltip{position:fixed;z-index:999;background:#1c2128;border:1px solid #388bfd;border-radius:6px;padding:9px 11px;font-family:monospace;font-size:11px;box-shadow:0 4px 20px #000a;pointer-events:none;display:none;min-width:200px}
.tt-title{font-size:10px;color:#6e7681;font-weight:700;margin-bottom:5px}
.tt-row{display:flex;justify-content:space-between;gap:10px;padding:2px 0;border-bottom:1px solid #21262d}
.tt-row:last-child{border:none}
.tt-k{color:#484f58;font-size:10px}.tt-v{color:#e6edf3}
.tt-v.h{color:#58a6ff}.tt-v.d{color:#3fb950}.tt-v.u{color:#a371f7}.tt-v.b{color:#f0883e;font-size:9px;letter-spacing:-.4px}

/* ── CPSR ── */
.cpsr-row{display:flex;gap:5px;flex-wrap:wrap}
.fc{background:#161b22;border:1px solid #21262d;border-radius:5px;padding:4px 7px;text-align:center;min-width:42px;transition:border-color .2s}
.fc.changed{border-color:#f0883e;background:#1f1005}
.fc .fn{font-size:9px;color:#484f58;font-weight:700}.fc .fv{font-size:14px;font-weight:700;font-family:monospace}
.fc .fv.set{color:#3fb950}.fc .fv.clr{color:#21262d}.fc.mode .fv{font-size:10px;color:#484f58}

/* ── NEON ── */
.nr{background:#161b22;border:1px solid #21262d;border-radius:5px;margin-bottom:5px;overflow:hidden;transition:border-color .2s}
.nr.changed{border-color:#a371f7;background:#130e20;animation:nf .35s}
@keyframes nf{0%{background:#261848}100%{background:#130e20}}
.nr-hdr{display:flex;align-items:center;gap:6px;padding:4px 8px;background:#1c2128;border-bottom:1px solid #21262d}
.nr-q{font-size:11px;font-weight:800;color:#a371f7;min-width:24px}
.nr-d{font-size:9px;color:#484f58}
.nr-raw{margin-left:auto;font-size:8px;color:#30363d;font-family:monospace}
.nr-lanes{padding:5px 6px;display:flex;flex-direction:column;gap:3px}
.lane-row{display:flex;align-items:flex-start;gap:4px}
.lane-type{font-size:8px;color:#30363d;font-weight:700;width:26px;text-align:right;flex-shrink:0;padding-top:4px;font-family:monospace}
.lanes{display:flex;gap:2px;flex:1}
.lane{flex:1;background:#0d1117;border:1px solid #1c2128;border-radius:3px;padding:2px;min-width:0;text-align:center}
.lv{display:block;font-family:monospace;font-size:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lv.u32{color:#58a6ff}.lv.f32{color:#f0883e}.lv.u16{color:#56d364}.lv.u8{color:#484f58}
.ll{width:100%;background:transparent;border:none;border-top:1px dashed #21262d;color:#3fb950;font-size:8px;padding:1px 2px;text-align:center;outline:none;margin-top:1px}
.ll::placeholder{color:#21262d}.ll:focus{border-color:#3fb950}
.nr-ds{display:flex;gap:2px;padding:2px 6px 4px;flex-wrap:wrap}
.dc{font-size:8px;padding:1px 4px;border-radius:3px;font-family:monospace;font-weight:700}
.d-c{background:#0d1a2d;color:#388bfd;border:1px solid #1a2d4a}
.s-c{background:#15102a;color:#7c5aed;border:1px solid #261848}

/* ── Compare ── */
.cmp-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:10px}
.cmp-table th{background:#161b22;color:#484f58;font-size:9px;text-transform:uppercase;padding:4px 7px;text-align:left;border-bottom:1px solid #21262d}
.cmp-table td{padding:4px 7px;border-bottom:1px solid #21262d;font-family:monospace}
.cmp-table tr.match td{background:#0a1a0f}.cmp-table tr.mis td{background:#1a0a0a}
.ok{color:#3fb950;font-weight:700}.bad{color:#f85149;font-weight:700}
.ar-wrap{margin-top:10px}
.ar-lbl{font-size:10px;color:#6e7681;margin-bottom:4px}
.ar-ta{width:100%;background:#161b22;border:1px solid #21262d;border-radius:4px;color:#cdd9e5;font-family:monospace;font-size:11px;padding:5px 7px;outline:none;resize:vertical;min-height:50px}
.ar-ta:focus{border-color:#a371f7}
.ar-results{margin-top:5px;display:flex;flex-direction:column;gap:3px}
.ar{font-size:11px;padding:3px 6px;border-radius:4px;font-family:monospace}
.ar.pass{background:#0d2318;color:#3fb950}.ar.fail{background:#1f0d0d;color:#f85149}.ar.err{background:#1a1208;color:#f0883e}

/* ── Status ── */
.status{background:#161b22;border-top:1px solid #21262d;padding:3px 12px;display:flex;gap:14px;font-size:10px;color:#484f58;flex-shrink:0}
.sdot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;background:#30363d;vertical-align:middle}
.sdot.ready{background:#3fb950}.sdot.run{background:#f0883e;animation:pulse .7s infinite alternate}
.sdot.err{background:#f85149}.sdot.done{background:#58a6ff}
@keyframes pulse{from{opacity:.4}to{opacity:1}}

::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#21262d;border-radius:2px}

/* ── Instruction tooltip ── */
.instr-tt{position:fixed;z-index:1000;background:#1c2128;border:1px solid #a371f7;border-radius:7px;padding:10px 13px;font-size:11px;box-shadow:0 6px 24px #000c;pointer-events:none;display:none;max-width:300px;line-height:1.55}
.it-mn{font-family:monospace;font-size:14px;color:#a371f7;font-weight:800;margin-bottom:2px}
.it-name{color:#6e7681;font-size:10px;text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
.it-desc{color:#cdd9e5;margin-bottom:7px;font-size:11px}
.it-syn{font-family:monospace;font-size:10px;color:#58a6ff;background:#0d1117;border-radius:4px;padding:4px 7px;margin-bottom:5px;display:block}
.it-note{color:#f0883e;font-size:10px}
</style>
<script src="engine/unicorn_arm.js"></script>
<script src="engine/keystone_arm.js"></script>
</head>
<body>

<!-- Instruction hover tooltip -->
<div class="instr-tt" id="instr-tt"></div>

<!-- Register value tooltip -->
<div class="tooltip" id="tooltip">
  <div class="tt-title" id="tt-title">R0</div>
  <div class="tt-row"><span class="tt-k">HEX</span><span class="tt-v h" id="tt-hex"></span></div>
  <div class="tt-row"><span class="tt-k">DEC signed</span><span class="tt-v d" id="tt-dec"></span></div>
  <div class="tt-row"><span class="tt-k">DEC unsigned</span><span class="tt-v u" id="tt-udec"></span></div>
  <div class="tt-row"><span class="tt-k">BIN</span><span class="tt-v b" id="tt-bin"></span></div>
</div>

<!-- Header -->
<div class="hdr">
  <h1>ARM Scalar → NEON</h1>
  <span class="badge arm">ARMv7</span>
  <span class="badge neon">NEON</span>
  <span class="badge qemu" id="eng-badge" title="Unicorn/QEMU engine">Engine: loading…</span>
  <div class="hdr-r">
    <button onclick="exportASM()" title="Export scalar + NEON as .s file" style="border-color:#484f58;color:#6e7681">⬇ Export .s</button>
    <button onclick="saveToStorage()" title="Save all functions to localStorage" style="border-color:#484f58;color:#6e7681" id="save-btn">Save</button>
    <button class="success" onclick="runAllVectors()">▶▶ Run All Vectors</button>
    <button class="primary" onclick="runBothAndCompare()">⇄ Compare</button>
  </div>
</div>

<!-- Function tabs -->
<div class="fn-tabs" id="fn-tabs">
  <button class="fn-add" onclick="addFunction()" title="New function">+</button>
</div>

<!-- Signature row -->
<div class="sig-row">
  <span class="sig-label">Signature:</span>
  <input class="sig-input" id="sig-input" placeholder="e.g.  int32_t dot(int32_t* a, int32_t* b, int32_t n)" oninput="onSigChange(this.value)">
  <span class="sig-parsed" id="sig-parsed"></span>
</div>

<!-- Test vectors -->
<div class="vec-section">
  <div class="vec-header">
    <span class="vec-title">Test Vectors</span>
    <button onclick="addVector()" style="padding:2px 8px;font-size:10px">+ Add</button>
    <button onclick="clearResults()" style="padding:2px 8px;font-size:10px;margin-left:auto;color:#484f58">Clear results</button>
  </div>
  <div class="vec-table-wrap">
    <table class="vt" id="vec-table">
      <thead id="vec-thead"><tr><th>#</th><th>expected</th><th>scalar</th><th>neon</th><th></th></tr></thead>
      <tbody id="vec-tbody"></tbody>
    </table>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Editors -->
  <div class="editors">
    <div class="etabs">
      <button class="etab active" id="etab-scalar" onclick="switchEditor('scalar')">Scalar ARM</button>
      <button class="etab" id="etab-neon" onclick="switchEditor('neon')">NEON</button>
    </div>

    <div class="editor-pane active" id="ep-scalar">
      <div class="ew">
        <div class="cur-line-hl" id="hl-scalar"></div>
        <div class="lnum" id="ln-scalar">1</div>
        <textarea class="code" id="code-scalar" spellcheck="false">// Scalar alpha blend — one pixel channel at a time
// dst[i] = (src[i]*alpha + dst[i]*(256-alpha)) >> 8
// R0=dst(ptr) R1=src(ptr) R2=alpha(0-255) R3=n
MOV R10, R0           // save dst base for return
RSB R4, R2, #256      // R4 = inv_alpha = 256 - alpha
MOV R5, #0            // i = 0
loop:
  LDR R6, [R0]        // dst[i]
  LDR R7, [R1]        // src[i]
  MUL R8, R7, R2      // src*alpha
  MUL R9, R6, R4      // dst*inv_alpha
  ADD R8, R8, R9      // sum
  LSR R8, R8, #8      // >> 8
  STR R8, [R0]        // write blended
  ADD R0, R0, #4      // dst++
  ADD R1, R1, #4      // src++
  ADD R5, R5, #1      // i++
  CMP R5, R3
  BLT loop
LDR R0, [R10]         // return dst[0]
</textarea>
      </div>
      <div class="ctrl-row">
        <button class="primary" onclick="loadCode('scalar')">Load</button>
        <button id="s-step" onclick="step('scalar')" disabled>▶ Step</button>
        <button id="s-run"  onclick="run('scalar')"  disabled>▶▶ Run</button>
        <button id="s-pause" onclick="pause('scalar')" disabled>⏸</button>
        <button id="s-reset" onclick="reset('scalar')" class="danger" disabled>↺</button>
        <div class="speed-w"><label>Speed</label><input type="range" id="spd-scalar" min="1" max="10" value="7"></div>
      </div>
      <div class="log" id="log-scalar"></div>
    </div>

    <div class="editor-pane" id="ep-neon">
      <div class="ew">
        <div class="cur-line-hl" id="hl-neon"></div>
        <div class="lnum" id="ln-neon">1</div>
        <textarea class="code" id="code-neon" spellcheck="false">// NEON alpha blend — four pixel channels at a time
// R0=dst(ptr) R1=src(ptr) R2=alpha(0-255) R3=n  (n multiple of 4)
MOV R10, R0
VDUP.32 Q0, R2         // Q0 = [alpha, alpha, alpha, alpha]
RSB R4, R2, #256
VDUP.32 Q1, R4         // Q1 = [inv_alpha x4]
loop:
  VLD1.32 {Q2}, [R0]  // load dst[0..3]
  VLD1.32 {Q3}, [R1]  // load src[0..3]
  VMUL.I32 Q4, Q3, Q0 // src * alpha
  VMUL.I32 Q5, Q2, Q1 // dst * inv_alpha
  VADD.I32 Q4, Q4, Q5 // sum
  VSHR.U32 Q4, Q4, #8 // >> 8
  VST1.32 {Q4}, [R0]  // write blended
  ADD R0, R0, #16     // dst += 4 words
  ADD R1, R1, #16     // src += 4 words

LDR R0, [R10]          // return dst[0]

<script>
// ═══════════════════════════════════════════════════════
//  FUNCTION REGISTRY
// ═══════════════════════════════════════════════════════
const fnRegistry = [];
let activeFnIdx = -1;

function createFn(sig='', scalarCode='// scalar code\n', neonCode='// NEON code\n') {
  return { id: Date.now(), sig, parsed: null, scalarCode, neonCode, vectors: [], results: [], labels:{regs:{}, lanes:{}} };
}

function activeFn() { return fnRegistry[activeFnIdx]; }

// ═══════════════════════════════════════════════════════
//  SIGNATURE PARSER
// ═══════════════════════════════════════════════════════
const SCALAR_TYPES = new Set(['int','int8_t','int16_t','int32_t','int64_t','uint8_t','uint16_t','uint32_t','uint64_t','long','short','char','float','double','void']);
const ELEM_SIZES   = { int:4, int8_t:1, int16_t:2, int32_t:4, int64_t:8, uint8_t:1, uint16_t:2, uint32_t:4, uint64_t:8, float:4, double:8, long:4, short:2, char:1 };

function inferKind(type) {
  const isPtr = type.includes('*');
  const base  = type.replace(/\*/g,'').trim();
  if (isPtr) return { base:'ptr', elemType:base, elemSize: ELEM_SIZES[base]||4 };
  if (base==='int64_t'||base==='uint64_t'||base==='long long') return { base:'scalar64' };
  if (base==='float'||base==='double') return { base:'float' };
  return { base:'scalar' };
}

function parseSig(sig) {
  sig = sig.trim();
  // "rettype name(type param, ...)"  — type may contain * or spaces
  const m = sig.match(/^([\w\s\*]+?)\s+(\w+)\s*\(([^)]*)\)\s*$/);
  if (!m) return null;
  const returnType = m[1].trim();
  const name       = m[2].trim();
  const paramStr   = m[3].trim();
  if (!name) return null;

  const params = paramStr ? paramStr.split(',').map(p => {
    p = p.trim();
    // last token (after stripping *) is name, rest is type
    const toks = p.split(/\s+/);
    let pname = toks.pop().replace(/^\*+/,'');
    let ptype = toks.join(' ');
    // pointer marker may be on the name side
    if (p.includes('*') && !ptype.includes('*')) ptype += '*';
    ptype = ptype.trim() || 'int';
    return { name: pname, type: ptype, kind: inferKind(ptype) };
  }) : [];

  return { returnType, name, params };
}

// ═══════════════════════════════════════════════════════
//  BINDING ENGINE — map test vector → sim registers/memory
// ═══════════════════════════════════════════════════════
const MEM_BASE = 0x10000;

function parseArr(str) {
  if (str === undefined || str === null) return [];
  str = String(str).trim();
  if (str.startsWith('[')) str = str.slice(1, str.lastIndexOf(']'));
  return str.split(',').map(s => { const n = parseFloat(s.trim()); return isNaN(n) ? 0 : n; });
}

function applyVector(st, parsed, vector) {
  if (!parsed) return {};
  let rIdx = 0;
  let sIdx = 0;  // VFP S registers (future)
  let memPtr = MEM_BASE;
  const ptrs = {};  // param name → { addr, count, elemSize }

  parsed.params.forEach(p => {
    const raw = vector[p.name];
    const k   = p.kind;

    if (k.base === 'scalar') {
      st.regs[rIdx++] = (parseInt(raw) || 0) | 0;

    } else if (k.base === 'scalar64') {
      if (rIdx & 1) rIdx++;  // align to even register pair
      const v = parseInt(raw) || 0;
      st.regs[rIdx++] = v & 0xFFFFFFFF;
      st.regs[rIdx++] = Math.floor(v / 2**32) | 0;

    } else if (k.base === 'float') {
      const f   = parseFloat(raw) || 0;
      const buf = new Float32Array([f]);
      st.regs[rIdx++] = new Int32Array(buf.buffer)[0];

    } else if (k.base === 'ptr') {
      const arr = parseArr(raw);
      const es  = k.elemSize;
      ptrs[p.name] = { addr: memPtr, count: arr.length, elemSize: es };
      arr.forEach((v, i) => {
        const a = (memPtr + i * es) >>> 0;
        if (es === 4) st.memory[a] = v | 0;
        else if (es === 2) { st.memory[a] = v & 0xFFFF; }
        else               { st.memory[a] = v & 0xFF; }
      });
      st.regs[rIdx++] = memPtr;
      memPtr += Math.max(arr.length, 1) * es;
    }
  });

  return ptrs;
}

function readReturn(st, returnType) {
  if (!returnType || returnType === 'void') return null;
  if (returnType === 'float') {
    const b = new Int32Array([st.regs[0]]);
    return new Float32Array(b.buffer)[0];
  }
  if (returnType === 'int64_t' || returnType === 'uint64_t') {
    return st.regs[0] + (st.regs[1] >>> 0) * 2**32;
  }
  return toS32(st.regs[0]);
}

function readOutputPtrs(st, parsed, ptrs) {
  const out = {};
  if (!parsed) return out;
  parsed.params.forEach(p => {
    if (p.kind.base === 'ptr' && ptrs[p.name]) {
      const { addr, count, elemSize } = ptrs[p.name];
      out[p.name] = Array.from({ length: count }, (_, i) => st.memory[(addr + i * elemSize) >>> 0] || 0);
    }
  });
  return out;
}

// ═══════════════════════════════════════════════════════
//  SIMULATOR CORE (single state with param)
// ═══════════════════════════════════════════════════════
const GP_ALIAS = {13:'SP', 14:'LR', 15:'PC'};
const toU32 = v => v>>>0;
const toS32 = v => v|0;
const hex8  = v => '0x'+toU32(v).toString(16).toUpperCase().padStart(8,'0');

function makeState() {
  return {
    regs: new Int32Array(16),
    cpsr: {N:0,Z:0,C:0,V:0},
    neon: Array.from({length:16}, () => new Uint8Array(16)),
    memory: {},
    labels: {}, instructions: [],
    pc: 0, cycles: 0, timer: null,
    changed: new Set(), neonChg: new Set(), flagChg: new Set()
  };
}
const S = { scalar: makeState(), neon: makeState() };

// NEON helpers
function qV(st,qi){ return new DataView(st.neon[qi].buffer, st.neon[qi].byteOffset, 16); }
function qGetU32(st,qi){ const v=qV(st,qi); return [0,1,2,3].map(i=>v.getUint32(i*4,true)); }
function qSetU32(st,qi,a){ const v=qV(st,qi); a.forEach((x,i)=>v.setUint32(i*4,x>>>0,true)); }
function qGetU16(st,qi){ const v=qV(st,qi); return Array.from({length:8},(_,i)=>v.getUint16(i*2,true)); }
function qSetU16(st,qi,a){ const v=qV(st,qi); a.forEach((x,i)=>v.setUint16(i*2,x&0xFFFF,true)); }
function qGetU8(st,qi){ return Array.from(st.neon[qi]); }
function qSetU8(st,qi,a){ a.forEach((x,i)=>st.neon[qi][i]=x&0xFF); }
function qGetF32(st,qi){ const u=qGetU8(st,qi); return [0,1,2,3].map(i=>new Float32Array(new Uint8Array([u[i*4],u[i*4+1],u[i*4+2],u[i*4+3]]).buffer)[0]); }
function qGetLanes(st,qi,ls){ if(ls===32)return qGetU32(st,qi); if(ls===16)return qGetU16(st,qi); if(ls===8)return qGetU8(st,qi); return qGetU32(st,qi); }
function qSetLanes(st,qi,ls,v){ if(ls===32){qSetU32(st,qi,v);return;} if(ls===16){qSetU16(st,qi,v);return;} if(ls===8){qSetU8(st,qi,v);return;} qSetU32(st,qi,v); }

function parseReg(t){ if(!t)return -1; t=t.trim().toUpperCase(); if(t==='SP')return 13; if(t==='LR')return 14; if(t==='PC')return 15; const m=t.match(/^R(\d+)$/); return m&&+m[1]<16?+m[1]:-1; }
function parseNR(t){ if(!t)return null; t=t.trim().toUpperCase(); const q=t.match(/^Q(\d+)$/); if(q&&+q[1]<16)return{t:'Q',i:+q[1]}; const d=t.match(/^D(\d+)$/); if(d&&+d[1]<32)return{t:'D',i:+d[1]}; const s=t.match(/^S(\d+)$/); if(s&&+s[1]<32)return{t:'S',i:+s[1]}; return null; }
function parseImm(t){ if(!t)return NaN; t=t.trim(); if(t.startsWith('#'))t=t.slice(1); if(/^0[xX]/.test(t))return parseInt(t,16); if(/^0[bB]/.test(t))return parseInt(t.slice(2),2); return parseInt(t,10); }
function resolveOp2(st,toks,i){ const t=toks[i]; if(!t)return{value:0,carry:st.cpsr.C}; const ri=parseReg(t); if(ri>=0){ let v=st.regs[ri],c=st.cpsr.C; const sh=(toks[i+1]||'').toUpperCase(); if(['LSL','LSR','ASR','ROR'].includes(sh)){ const s2=toks[i+2]||'#0'; let sa=s2.startsWith('#')?parseImm(s2):(parseReg(s2)>=0?st.regs[parseReg(s2)]&0xFF:0); if(sh==='LSL'){c=sa>0?(v>>>(32-sa))&1:c;v=sa>=32?0:v<<sa;}else if(sh==='LSR'){c=sa>0?(v>>>(sa-1))&1:c;v=sa>=32?0:v>>>sa;}else if(sh==='ASR'){c=sa>0?(v>>(sa-1))&1:c;v=sa>=32?v>>31:v>>sa;}else if(sh==='ROR'){sa&=31;c=sa>0?(v>>>(sa-1))&1:c;v=sa?((v>>>sa)|(v<<(32-sa))):v;} }return{value:v,carry:c};} const im=parseImm(t);return{value:isNaN(im)?0:im,carry:st.cpsr.C}; }

function flagsAdd(st,a,b,r){ st.cpsr.N=(toU32(r)>>>31)&1;st.cpsr.Z=toU32(r)===0?1:0;st.cpsr.C=(toU32(a)+toU32(b))>0xFFFFFFFF?1:0;st.cpsr.V=((toS32(a)>0&&toS32(b)>0&&toS32(r)<0)||(toS32(a)<0&&toS32(b)<0&&toS32(r)>=0))?1:0;['N','Z','C','V'].forEach(f=>st.flagChg.add(f)); }
function flagsSub(st,a,b,r){ st.cpsr.N=(toU32(r)>>>31)&1;st.cpsr.Z=toU32(r)===0?1:0;st.cpsr.C=toU32(a)>=toU32(b)?1:0;st.cpsr.V=((toS32(a)>0&&toS32(b)<0&&toS32(r)<0)||(toS32(a)<0&&toS32(b)>0&&toS32(r)>0))?1:0;['N','Z','C','V'].forEach(f=>st.flagChg.add(f)); }
function flagsLogic(st,r,c){ st.cpsr.N=(toU32(r)>>>31)&1;st.cpsr.Z=toU32(r)===0?1:0;st.cpsr.C=c;['N','Z','C'].forEach(f=>st.flagChg.add(f)); }

function nLaneOp(isF,isS,ls,a,b,op){
  if(isF&&ls===32){ const fa=new Float32Array(new Uint32Array([a>>>0]).buffer)[0],fb=new Float32Array(new Uint32Array([b>>>0]).buffer)[0]; let r; if(op==='ADD')r=fa+fb;else if(op==='SUB')r=fa-fb;else if(op==='MUL')r=fa*fb;else if(op==='ABS')r=Math.abs(fa);else if(op==='NEG')r=-fa;else if(op==='MAX')r=Math.max(fa,fb);else if(op==='MIN')r=Math.min(fa,fb);else r=fa; return new Uint32Array(new Float32Array([r]).buffer)[0]; }
  const ua=a>>>0,ub=b>>>0,mask=ls>=32?0xFFFFFFFF:(1<<ls)-1;
  const sa=toS32(ua),sb=toS32(ub);
  switch(op){ case'ADD':return(ua+ub)&mask;case'SUB':return(ua-ub)&mask;case'MUL':return Math.imul(ua,ub)>>>0&mask;case'AND':return(ua&ub)&mask;case'ORR':return(ua|ub)&mask;case'EOR':return(ua^ub)&mask;case'ABS':return(isS?Math.abs(sa):ua)&mask;case'NEG':return(-ua)&mask;case'MAX':return(isS?Math.max(sa,sb):Math.max(ua,ub))&mask;case'MIN':return(isS?Math.min(sa,sb):Math.min(ua,ub))&mask;case'SHL':return(ua<<(ub&31))&mask;case'SHR':return isS?(sa>>(ub&31))&mask:(ua>>>(ub&31))&mask;default:return ua&mask; }
}

function execNeon(st,raw,toks){
  const n0=toks[0].toUpperCase(); const m=n0.match(/^([A-Z][A-Z0-9]*)(?:\.([UuIiSsFf]?)(\d+))?$/);
  const op=m?m[1]:n0,kind=(m&&m[2]||'I').toUpperCase(),ls=m&&m[3]?+m[3]:32,isF=kind==='F',isS=kind==='S'||kind==='I',lpq=128/ls;
  function rQ(t){ const nr=parseNR(t.replace(/[{}]/g,'').trim()); if(!nr)throw`Bad NEON:${t}`; return nr.t==='Q'?nr.i:nr.i>>1; }
  function memRn(t){ const rn=parseReg((t||'').replace(/[\[\]!]/g,'').split(',')[0].trim()); if(rn<0)throw`Bad mem reg:${t}`; return rn; }
  switch(op){
    case'VLD1':{ const dq=rQ(toks[1]); const rn=memRn(toks[2]); const addr=st.regs[rn]>>>0; const es=ls>>3; const vals=Array.from({length:lpq},(_,i)=>st.memory[(addr+i*es)>>>0]||0); qSetLanes(st,dq,ls,vals); st.neonChg.add(dq); return`VLD1 Q${dq}←[${hex8(addr)}]`; }
    case'VST1':{ const dq=rQ(toks[1]); const rn=memRn(toks[2]); const addr=st.regs[rn]>>>0; const es=ls>>3; const vals=qGetLanes(st,dq,ls); vals.forEach((v,i)=>{st.memory[(addr+i*es)>>>0]=v;}); return`VST1 [${hex8(addr)}]←Q${dq}`; }
    case'VLD2':{ const dq=rQ(toks[1]); const rn=memRn(toks[2]); const addr=st.regs[rn]>>>0; const es=ls>>3; const vals=Array.from({length:lpq*2},(_,i)=>st.memory[(addr+i*es)>>>0]||0); qSetLanes(st,dq,ls,vals.filter((_,i)=>i%2===0)); qSetLanes(st,dq+1,ls,vals.filter((_,i)=>i%2===1)); st.neonChg.add(dq); st.neonChg.add(dq+1); return`VLD2 Q${dq},Q${dq+1}`; }
    case'VST2':{ const dq=rQ(toks[1]); const rn=memRn(toks[2]); const addr=st.regs[rn]>>>0; const es=ls>>3; const a=qGetLanes(st,dq,ls),b=qGetLanes(st,dq+1,ls); a.forEach((v,i)=>{st.memory[(addr+i*2*es)>>>0]=v; st.memory[(addr+(i*2+1)*es)>>>0]=b[i];}); return`VST2`; }
    case'VMOV':{ const rd=parseReg(toks[1]); if(rd>=0){ const nr=parseNR((toks[2]||'').trim()); if(nr&&nr.t==='S'){ const qi=nr.i>>2,lane=nr.i&3; const v=new DataView(st.neon[qi].buffer).getUint32(lane*4,true); st.regs[rd]=v|0; st.changed.add(rd); return`VMOV R${rd}=S${nr.i}`; } } const dq=rQ(toks[1]); const imm=parseImm(toks[2]); if(!isNaN(imm)){qSetLanes(st,dq,ls,Array(lpq).fill(imm>>>0));st.neonChg.add(dq);}else{const sq=rQ(toks[2]);st.neon[dq].set(st.neon[sq]);st.neonChg.add(dq);} return`VMOV Q${dq}`; }
    case'VADD':case'VSUB':case'VMUL':case'VAND':case'VORR':case'VEOR':case'VMAX':case'VMIN':{ const on=op.slice(1),dq=rQ(toks[1]),sq1=rQ(toks[2]),sq2=rQ(toks[3]),a=qGetLanes(st,sq1,ls),b=qGetLanes(st,sq2,ls); qSetLanes(st,dq,ls,a.map((v,i)=>nLaneOp(isF,isS,ls,v,b[i],on)));st.neonChg.add(dq);return`${op} Q${dq}`; }
    case'VSHL':case'VSHR':{ const on=op.slice(1),dq=rQ(toks[1]),sq=rQ(toks[2]),sa=parseImm(toks[3])||0,a=qGetLanes(st,sq,ls); qSetLanes(st,dq,ls,a.map(v=>nLaneOp(isF,isS,ls,v,sa,on)));st.neonChg.add(dq);return`${op} Q${dq}#${sa}`; }
    case'VMLA':{ const dq=rQ(toks[1]),sq1=rQ(toks[2]),sq2=rQ(toks[3]),a=qGetLanes(st,sq1,ls),b=qGetLanes(st,sq2,ls),ac=qGetLanes(st,dq,ls); qSetLanes(st,dq,ls,a.map((v,i)=>(nLaneOp(isF,isS,ls,v,b[i],'MUL')+ac[i])&0xFFFFFFFF));st.neonChg.add(dq);return`VMLA Q${dq}`; }
    case'VNEG':case'VABS':{ const on=op.slice(1),dq=rQ(toks[1]),sq=rQ(toks[2]),a=qGetLanes(st,sq,ls); qSetLanes(st,dq,ls,a.map(v=>nLaneOp(isF,isS,ls,v,0,on)));st.neonChg.add(dq);return`${op} Q${dq}`; }
    case'VDUP':{ const dq=rQ(toks[1]),ri=parseReg(toks[2]),val=ri>=0?st.regs[ri]:(parseImm(toks[2])||0); qSetLanes(st,dq,ls,Array(lpq).fill(val>>>0));st.neonChg.add(dq);return`VDUP Q${dq}←${ri>=0?'R'+ri:val}`; }
    case'VPADD':{
      // VPADD Dd, Dn, Dm — pairwise add: Dd[0]=Dn[0]+Dn[1], Dd[1]=Dm[0]+Dm[1]
      function getDlanes(di){ const qi=di>>1,h=di&1,ql=qGetU32(st,qi); return h?[ql[2],ql[3]]:[ql[0],ql[1]]; }
      function setDlanes(di,v){ const qi=di>>1,h=di&1,ql=qGetU32(st,qi); if(h){ql[2]=v[0];ql[3]=v[1];}else{ql[0]=v[0];ql[1]=v[1];} qSetU32(st,qi,ql);st.neonChg.add(qi); }
      const ndTok=t=>parseNR((t||'').trim()); const dd=ndTok(toks[1])?.i??0,dn=ndTok(toks[2])?.i??0,dm=ndTok(toks[3])?.i??0;
      const la=getDlanes(dn),lb=getDlanes(dm);
      setDlanes(dd,[(la[0]+la[1])>>>0,(lb[0]+lb[1])>>>0]);
      return`VPADD D${dd}`;
    }
    case'VCEQ':case'VCGT':case'VCLT':{ const ct=op.slice(2),dq=rQ(toks[1]),sq1=rQ(toks[2]),sq2=rQ(toks[3]),a=qGetLanes(st,sq1,ls),b=qGetLanes(st,sq2,ls),mask=ls>=32?0xFFFFFFFF:(1<<ls)-1; qSetLanes(st,dq,ls,a.map((v,i)=>(ct==='EQ'?v===b[i]:ct==='GT'?v>b[i]:v<b[i])?mask:0));st.neonChg.add(dq);return`${op} Q${dq}`; }
    default: throw`Unknown NEON:${op}`;
  }
}

function execInstr(st, instr) {
  st.changed.clear(); st.neonChg.clear(); st.flagChg.clear();
  const raw=instr.raw.trim();
  const mm=raw.match(/\[([^\]]+)\]/); let prep=raw;
  if(mm)prep=raw.replace(/\[([^\]]+)\]/,'__MEM__');
  const toks=prep.split(/[\s,]+/).filter(Boolean);
  if(mm){const mi=toks.indexOf('__MEM__');if(mi>=0)toks[mi]='['+mm[1]+']';}
  const n0=toks[0].toUpperCase();
  if(n0.startsWith('V'))return execNeon(st,raw,toks);
  function dp3(){if(toks.length>=4)return{rd:parseReg(toks[1]),rn:parseReg(toks[2]),op2:resolveOp2(st,toks,3)};const rd=parseReg(toks[1]);return{rd,rn:rd,op2:resolveOp2(st,toks,2)};}

    case'NOP':return'NOP';
    case'MOV':case'MOVS':case'MOVEQ':case'MOVNE':case'MOVLT':case'MOVLE':case'MOVGT':case'MOVGE':case'MOVCS':case'MOVCC':case'MOVMI':case'MOVPL':case'MOVHI':case'MOVLS':{
      const cc=n0.replace(/^MOVS?/,'');
      const taken=(()=>{const{N,Z,C,V}=st.cpsr;switch(cc){case'':return true;case'EQ':return Z;case'NE':return!Z;case'LT':return N!==V;case'LE':return Z||(N!==V);case'GT':return!Z&&(N===V);case'GE':return N===V;case'CS':return C;case'CC':return!C;case'MI':return N;case'PL':return!N;case'HI':return C&&!Z;case'LS':return!C||Z;default:return true;}})();
      const rd=parseReg(toks[1]);if(rd<0)throw`Bad reg`;
      if(!taken)return`${n0} not taken`;
      const{value:v,carry}=resolveOp2(st,toks,2);st.regs[rd]=v;st.changed.add(rd);if(n0==='MOVS')flagsLogic(st,v,carry);return`R${rd}=${hex8(v)}`;}
    case'MVN':case'MVNS':{const rd=parseReg(toks[1]);if(rd<0)throw`Bad reg`;const{value:v,carry}=resolveOp2(st,toks,2);const r=~v;st.regs[rd]=r;st.changed.add(rd);if(n0==='MVNS')flagsLogic(st,r,carry);return`R${rd}=~${hex8(v)}`;}
    case'ADD':case'ADDS':{const{rd,rn,op2}=dp3();if(rd<0)throw`Bad reg`;const a=st.regs[rn<0?rd:rn],b=op2.value,r=(a+b)|0;st.regs[rd]=r;st.changed.add(rd);if(n0==='ADDS')flagsAdd(st,a,b,r);return`R${rd}=${hex8(a)}+${hex8(b)}=${hex8(r)}`;}
    case'SUB':case'SUBS':{const{rd,rn,op2}=dp3();if(rd<0)throw`Bad reg`;const a=st.regs[rn<0?rd:rn],b=op2.value,r=(a-b)|0;st.regs[rd]=r;st.changed.add(rd);if(n0==='SUBS')flagsSub(st,a,b,r);return`R${rd}=${hex8(r)}`;}
    case'RSB':{const rd=parseReg(toks[1]),rn=parseReg(toks[2]);if(rd<0)throw`Bad reg`;const{value:b}=resolveOp2(st,toks,3);const a=st.regs[rn<0?rd:rn],r=(b-a)|0;st.regs[rd]=r;st.changed.add(rd);return`R${rd}=${hex8(r)}`;}
    case'MUL':case'MULS':{const rd=parseReg(toks[1]),rm=parseReg(toks[2]),rsi=parseReg(toks[3]),rs=rsi>=0?rsi:rd;if(rd<0||rm<0)throw`Bad reg`;const a=st.regs[rm],b=st.regs[rs],r=Math.imul(a,b);st.regs[rd]=r;st.changed.add(rd);return`R${rd}=${toS32(a)}*${toS32(b)}=${hex8(r)}`;}
    case'AND':case'ANDS':{const{rd,rn,op2}=dp3();if(rd<0)throw`Bad reg`;const a=st.regs[rn<0?rd:rn],b=op2.value,r=(a&b)|0;st.regs[rd]=r;st.changed.add(rd);if(n0==='ANDS')flagsLogic(st,r,op2.carry);return`R${rd}=${hex8(r)}`;}
    case'ORR':case'ORRS':{const{rd,rn,op2}=dp3();if(rd<0)throw`Bad reg`;const a=st.regs[rn<0?rd:rn],b=op2.value,r=(a|b)|0;st.regs[rd]=r;st.changed.add(rd);if(n0==='ORRS')flagsLogic(st,r,op2.carry);return`R${rd}=${hex8(r)}`;}
    case'EOR':case'EORS':{const{rd,rn,op2}=dp3();if(rd<0)throw`Bad reg`;const a=st.regs[rn<0?rd:rn],b=op2.value,r=(a^b)|0;st.regs[rd]=r;st.changed.add(rd);if(n0==='EORS')flagsLogic(st,r,op2.carry);return`R${rd}=${hex8(r)}`;}
    case'BIC':{const{rd,rn,op2}=dp3();if(rd<0)throw`Bad reg`;const a=st.regs[rn<0?rd:rn],b=op2.value,r=(a&~b)|0;st.regs[rd]=r;st.changed.add(rd);return`R${rd}=${hex8(r)}`;}
    case'LSL':case'LSLS':{const rd=parseReg(toks[1]),rm=parseReg(toks[2]);if(rd<0||rm<0)throw`Bad reg`;const sa=toks[3]?.startsWith('#')?parseImm(toks[3]):st.regs[parseReg(toks[3])||0]&0xFF;const a=st.regs[rm],c=sa>0?(a>>>(32-sa))&1:st.cpsr.C,r=sa>=32?0:a<<sa;st.regs[rd]=r;st.changed.add(rd);if(n0==='LSLS')flagsLogic(st,r,c);return`R${rd}=${hex8(r)}`;}
    case'LSR':case'LSRS':{const rd=parseReg(toks[1]),rm=parseReg(toks[2]);if(rd<0||rm<0)throw`Bad reg`;const sa=toks[3]?.startsWith('#')?parseImm(toks[3]):st.regs[parseReg(toks[3])||0]&0xFF;const a=st.regs[rm],c=sa>0?(a>>>(sa-1))&1:st.cpsr.C,r=sa>=32?0:a>>>sa;st.regs[rd]=r;st.changed.add(rd);if(n0==='LSRS')flagsLogic(st,r,c);return`R${rd}=${hex8(r)}`;}
    case'ASR':case'ASRS':{const rd=parseReg(toks[1]),rm=parseReg(toks[2]);if(rd<0||rm<0)throw`Bad reg`;const sa=toks[3]?.startsWith('#')?parseImm(toks[3]):st.regs[parseReg(toks[3])||0]&0xFF;const a=st.regs[rm],c=sa>0?(a>>(sa-1))&1:st.cpsr.C,r=sa>=32?a>>31:a>>sa;st.regs[rd]=r;st.changed.add(rd);if(n0==='ASRS')flagsLogic(st,r,c);return`R${rd}=${hex8(r)}`;}
    case'ROR':{const rd=parseReg(toks[1]),rm=parseReg(toks[2]);if(rd<0||rm<0)throw`Bad reg`;const rsa=(toks[3]?.startsWith('#')?parseImm(toks[3]):st.regs[parseReg(toks[3])||0]&0xFF)&31;const a=st.regs[rm],c=rsa>0?(a>>>(rsa-1))&1:st.cpsr.C,r=rsa?((a>>>rsa)|(a<<(32-rsa))):a;st.regs[rd]=r;st.changed.add(rd);return`R${rd}=${hex8(r)}`;}
    case'CMP':{const rn=parseReg(toks[1]);if(rn<0)throw`Bad reg`;const{value:b}=resolveOp2(st,toks,2);const a=st.regs[rn];flagsSub(st,a,b,(a-b)|0);return`CMP N=${st.cpsr.N}Z=${st.cpsr.Z}C=${st.cpsr.C}V=${st.cpsr.V}`;}
    case'CMN':{const rn=parseReg(toks[1]);if(rn<0)throw`Bad reg`;const{value:b}=resolveOp2(st,toks,2);const a=st.regs[rn];flagsAdd(st,a,b,(a+b)|0);return`CMN flags`;}
    case'TST':{const rn=parseReg(toks[1]);if(rn<0)throw`Bad reg`;const{value:b,carry}=resolveOp2(st,toks,2);flagsLogic(st,st.regs[rn]&b,carry);return`TST flags`;}
    case'LDR':{const rd=parseReg(toks[1]);if(rd<0)throw`Bad reg`;const src=toks[2];if(!src)throw'Missing src';if(src.startsWith('=')){const v=parseImm(src.slice(1));st.regs[rd]=isNaN(v)?0:v;st.changed.add(rd);return`R${rd}=${hex8(st.regs[rd])}`;}if(src.startsWith('[')){const inn=src.slice(1,src.lastIndexOf(']')).split(',');const rn=parseReg(inn[0].trim());const off=inn[1]?parseImm(inn[1].trim()):0;const addr=(st.regs[rn>=0?rn:0]+(isNaN(off)?0:off))>>>0;st.regs[rd]=st.memory[addr]||0;st.changed.add(rd);return`R${rd}=MEM[${hex8(addr)}]=${hex8(st.regs[rd])}`;}throw`Bad LDR`;}
    case'STR':{const rd=parseReg(toks[1]);if(rd<0)throw`Bad reg`;const dst=toks[2];if(!dst||!dst.startsWith('['))throw`Expected [Rn]`;const inn=dst.slice(1,dst.lastIndexOf(']')).split(',');const rn=parseReg(inn[0].trim());const off=inn[1]?parseImm(inn[1].trim()):0;const addr=(st.regs[rn>=0?rn:0]+(isNaN(off)?0:off))>>>0;st.memory[addr]=st.regs[rd];return`MEM[${hex8(addr)}]=R${rd}`;}
    case'B':case'BAL':case'BEQ':case'BNE':case'BLT':case'BLE':case'BGT':case'BGE':case'BCS':case'BCC':case'BMI':case'BPL':case'BVS':case'BVC':case'BHI':case'BLS':{
      const cc=n0.slice(1)||'AL';
      const taken=(()=>{const{N,Z,C,V}=st.cpsr;switch(cc){case'AL':return true;case'EQ':return Z;case'NE':return!Z;case'LT':return N!==V;case'LE':return Z||(N!==V);case'GT':return!Z&&(N===V);case'GE':return N===V;case'CS':case'HS':return C;case'CC':case'LO':return!C;case'MI':return N;case'PL':return!N;case'VS':return V;case'VC':return!V;case'HI':return C&&!Z;case'LS':return!C||Z;default:return true;}})();
      const lb=(toks[1]||'').toUpperCase();if(!(lb in st.labels))throw`Unknown label:${toks[1]}`;
      if(taken){st.pc=st.labels[lb];st.changed.add(15);return`${n0}→${toks[1]}`;}
      return`${n0} not taken`;}
    case'BL':case'BLAL':case'BLEQ':case'BLNE':case'BLLT':case'BLLE':case'BLGT':case'BLGE':{
      const cc=n0.slice(2)||'AL';
      const taken=(()=>{const{N,Z,C,V}=st.cpsr;switch(cc){case'AL':return true;case'EQ':return Z;case'NE':return!Z;case'LT':return N!==V;case'LE':return Z||(N!==V);case'GT':return!Z&&(N===V);case'GE':return N===V;default:return true;}})();
      const lb=(toks[1]||'').toUpperCase();if(!(lb in st.labels))throw`Unknown label:${toks[1]}`;
      if(taken){st.regs[14]=st.pc;st.pc=st.labels[lb];st.changed.add(14);st.changed.add(15);return`${n0}→${toks[1]}`;}
      return`${n0} not taken`;}
    case'BX':{const rm=parseReg(toks[1]);if(rm<0)throw`Bad reg`;st.pc=st.regs[rm];st.changed.add(15);return`BX R${rm}`;}
    case'PUSH':{const lst=raw.slice(raw.indexOf('{')+1,raw.lastIndexOf('}'));const rs=lst.split(',').map(s=>parseReg(s.trim())).filter(r=>r>=0).sort((a,b)=>b-a);rs.forEach(r=>{st.regs[13]-=4;st.memory[st.regs[13]>>>0]=st.regs[r];});st.changed.add(13);return`PUSH`;}
    case'POP':{const lst=raw.slice(raw.indexOf('{')+1,raw.lastIndexOf('}'));const rs=lst.split(',').map(s=>parseReg(s.trim())).filter(r=>r>=0).sort((a,b)=>a-b);rs.forEach(r=>{st.regs[r]=st.memory[st.regs[13]>>>0]||0;st.regs[13]+=4;st.changed.add(r);});st.changed.add(13);return`POP`;}
    default:throw`Unknown:${n0}`;
  }
}

function firstPass(lines, st) {
  st.labels={}; st.instructions=[]; let idx=0;
  lines.forEach((raw,li)=>{ let line=raw.trim().replace(/\/\/.*$/,'').replace(/;.*$/,'').trim(); if(!line)return; if(line.endsWith(':')){ st.labels[line.slice(0,-1).trim().toUpperCase()]=idx;return;} const ci=line.indexOf(':'); if(ci>0&&!/\[/.test(line.slice(0,ci))){ st.labels[line.slice(0,ci).trim().toUpperCase()]=idx;line=line.slice(ci+1).trim();if(!line)return;} st.instructions.push({raw:line,lineNum:li+1});idx++; });
}

// Run state to completion and return { returnVal, outputPtrs }
function runToEnd(st, parsed, vectorObj) {
  const ptrs = parsed ? applyVector(st, parsed, vectorObj) : {};
  let guard = 0;
  while (st.pc < st.instructions.length && guard++ < 50000) {
    const instr = st.instructions[st.pc]; st.pc++; st.cycles++;
    try { execInstr(st, instr); st.regs[15]=st.pc; } catch(e) { break; }
  }
  const retVal = parsed ? readReturn(st, parsed.returnType) : toS32(st.regs[0]);
  const outPtrs = parsed ? readOutputPtrs(st, parsed, ptrs) : {};
  return { retVal, outPtrs };
}

// ═══════════════════════════════════════════════════════
//  RUN ALL VECTORS
// ═══════════════════════════════════════════════════════
function runAllVectors() {
  const fn = activeFn(); if (!fn) return;
  if (enginesReady) { runAllVectorsUnicorn(fn); return; }

  const parsed = fn.parsed;
  ['scalar','neon'].forEach(which => {
    const st = S[which];
    clearTimer(st);
    const lines = document.getElementById(`code-${which}`).value.split('\n');
    firstPass(lines, st);
  });

  fn.results = fn.vectors.map((vec) => {
    const result = { scalar: null, neon: null };
    ['scalar','neon'].forEach(which => {
      const st = S[which];
      st.regs.fill(0); st.cpsr={N:0,Z:0,C:0,V:0};
      st.neon.forEach(q=>q.fill(0)); st.memory={}; st.pc=0; st.cycles=0;
      st.changed.clear(); st.neonChg.clear(); st.flagChg.clear();
      const { retVal, outPtrs } = runToEnd(st, parsed, vec);
      result[which] = { retVal, outPtrs };
    });
    return result;
  });

  for(let i=0;i<16;i++){S.scalar.changed.add(i);S.neon.changed.add(i);}
  S.neon.neon.forEach((_,qi)=>S.neon.neonChg.add(qi));
  renderAll('both'); renderVecTable(); renderCompare();
  setStatus('scalar','done',`${fn.vectors.length} vectors done`);
  setStatus('neon','done',`${fn.vectors.length} vectors done`);
}

async function runAllVectorsUnicorn(fn) {
  const parsed = fn.parsed;
  setStatus('scalar','run','QEMU running…');
  setStatus('neon','run','QEMU running…');
  fn.results = [];
  try {
    for (const vec of fn.vectors) {
      const result = { scalar: null, neon: null };
      for (const which of ['scalar','neon']) {
        try {
          const { st, retVal, outPtrs } = await runWithUnicorn(which, parsed, vec);
          Object.assign(S[which], { regs: st.regs, neon: st.neon, cpsr: st.cpsr,
            changed: st.changed, neonChg: st.neonChg, flagChg: st.flagChg });
          result[which] = { retVal, outPtrs };
        } catch(e) {
          result[which] = { retVal: null, outPtrs: {}, error: String(e) };
          console.error(`Unicorn ${which}:`, e);
        }
      }
      fn.results.push(result);
    }
  } catch(e) {
    setStatus('scalar','err',`QEMU error: ${e}`);
    setStatus('neon','err',`QEMU error: ${e}`);
    return;
  }
  renderAll('both'); renderVecTable(); renderCompare();
  setStatus('scalar','done',`${fn.vectors.length} vectors done (QEMU)`);
  setStatus('neon','done',`${fn.vectors.length} vectors done (QEMU)`);
}

// Parse expected: '[1,2,3]' → [1,2,3]  or  '70' → 70
function parseExpected(s) {
  if (s === undefined || s === null || s === '') return undefined;
  s = String(s).trim();
  if (s.startsWith('[')) {
    const inner = s.slice(1, s.lastIndexOf(']'));
    return inner.split(',').map(x => parseFloat(x.trim())).filter(x => !isNaN(x));
  }
  const n = parseFloat(s);
  return isNaN(n) ? undefined : n;
}

// First output-ptr param name (e.g. 'dst')
function firstOutPtr(parsed) {
  if (!parsed) return null;
  return parsed.params.find(p => p.kind.base === 'ptr') || null;
}

// Render an output array; each element coloured vs the other side's output
function renderArrCell(actual, other) {
  if (!actual) return `<span style="color:#484f58">—</span>`;
  const parts = actual.map((v, i) => {
    const ok = other ? Math.round(v) === Math.round(other[i]) : null;
    const col = ok === null ? '#e6edf3' : ok ? '#3fb950' : '#f85149';
    return `<span style="color:${col}">${v}</span>`;
  });
  return `<span style="font-family:monospace;font-size:10px">[${parts.join('<span style="color:#484f58">,</span>')}]</span>`;
}

function renderVecTable() {
  const fn = activeFn(); if (!fn) return;
  const parsed = fn.parsed;
  const outP = firstOutPtr(parsed);  // first ptr param used as primary output

  // Build header
  const thead = document.getElementById('vec-thead');
  let thHtml = '<tr><th>#</th>';
  if (parsed) parsed.params.forEach(p => { thHtml += `<th>${p.name}<span style="color:#30363d;font-weight:400"> :${p.type}</span></th>`; });
  thHtml += `<th style="color:#f0883e">expected</th><th style="color:#3fb950">scalar ${outP?`<span style="color:#30363d;font-size:9px">${outP.name}[]</span>`:'ret'}</th><th style="color:#a371f7">neon ${outP?`<span style="color:#30363d;font-size:9px">${outP.name}[]</span>`:'ret'}</th><th></th></tr>`;
  thead.innerHTML = thHtml;

  // Build rows
  const tbody = document.getElementById('vec-tbody');
  tbody.innerHTML = '';
  fn.vectors.forEach((vec, vi) => {
    const res = fn.results[vi];
    const expNum = parseExpected(vec.expected);
    const sOut = outP ? res?.scalar?.outPtrs?.[outP.name] : null;
    const nOut = outP ? res?.neon?.outPtrs?.[outP.name] : null;
    const sVal = res?.scalar?.retVal;
    const nVal = res?.neon?.retVal;

    // Pass/fail: arrays → scalar must match neon; scalars → both match expected
    let pass = false;
    if (res) {
      if (outP && sOut && nOut) pass = sOut.every((v, i) => Math.round(v) === Math.round(nOut[i]));
      else if (typeof expNum === 'number' && sVal != null && nVal != null)
        pass = Math.round(sVal) === Math.round(expNum) && Math.round(nVal) === Math.round(expNum);
    }
    const rowCls = res ? (pass ? 'vt-pass' : 'vt-fail') : '';

    let tdHtml = `<td class="vt-num">${vi+1}</td>`;
    if (parsed) {
      parsed.params.forEach(p => {
        const v = vec[p.name] !== undefined ? vec[p.name] : '';
        tdHtml += `<td><input class="vt-input" value="${v}" onchange="setVecParam(${vi},'${p.name}',this.value)"></td>`;
      });
    }
    tdHtml += `<td><input class="vt-expected" value="${vec.expected ?? ''}" onchange="setVecParam(${vi},'expected',this.value)" title="Optional scalar return check (e.g. 70)"></td>`;

    if (outP) {
      // Array output: colour each element comparing scalar vs neon
      tdHtml += `<td class="vt-result" style="min-width:110px">${res ? renderArrCell(sOut, nOut) : ''}</td>`;
      tdHtml += `<td class="vt-result" style="min-width:110px">${res ? renderArrCell(nOut, sOut) : ''}</td>`;
    } else {
      const sOk = typeof expNum==='number' && sVal!=null && Math.round(sVal)===Math.round(expNum);
      const nOk = typeof expNum==='number' && nVal!=null && Math.round(nVal)===Math.round(expNum);
      tdHtml += `<td class="vt-result ${sOk?'ok':res?'fail':''}">${res?`${sVal ?? '—'}`:''}</td>`;
      tdHtml += `<td class="vt-result ${nOk?'ok':res?'fail':''}">${res?`${nVal ?? '—'}`:''}</td>`;
    }
    tdHtml += `<td><button class="vt-del" onclick="deleteVector(${vi})" title="Remove">×</button></td>`;

    const tr = document.createElement('tr');
    tr.className = rowCls;
    tr.innerHTML = tdHtml;
    tbody.appendChild(tr);
  });
}

function setVecParam(vi, key, val) {
  const fn = activeFn(); if (!fn) return;
  fn.vectors[vi][key] = val;
  fn.results[vi] = null;  // invalidate
  scheduleAutoSave();
}

function addVector() {
  const fn = activeFn(); if (!fn) return;
  const vec = { expected: '' };
  if (fn.parsed) fn.parsed.params.forEach(p => vec[p.name] = p.kind.base === 'ptr' ? '[0, 0, 0, 0]' : '0');
  fn.vectors.push(vec);
  fn.results.push(null);
  renderVecTable();
  scheduleAutoSave();
}

function deleteVector(vi) {
  const fn = activeFn(); if (!fn) return;
  fn.vectors.splice(vi, 1);
  fn.results.splice(vi, 1);
  renderVecTable();
  scheduleAutoSave();
}

function clearResults() {
  const fn = activeFn(); if (!fn) return;
  fn.results = fn.vectors.map(() => null);
  renderVecTable();
}

// ═══════════════════════════════════════════════════════
//  FUNCTION MANAGEMENT
// ═══════════════════════════════════════════════════════
function addFunction(sig='', scalarCode='', neonCode='') {
  const fn = createFn(sig, scalarCode || '// scalar ARM code\n', neonCode || '// NEON code\n');
  fnRegistry.push(fn);
  selectFunction(fnRegistry.length - 1);
  renderFnTabs();
}

function selectFunction(idx) {
  if (idx < 0 || idx >= fnRegistry.length) return;
  // Save current editor content back to current fn
  if (activeFnIdx >= 0 && fnRegistry[activeFnIdx]) {
    fnRegistry[activeFnIdx].scalarCode = document.getElementById('code-scalar').value;
    fnRegistry[activeFnIdx].neonCode   = document.getElementById('code-neon').value;
    fnRegistry[activeFnIdx].sig        = document.getElementById('sig-input').value;
  }
  activeFnIdx = idx;
  const fn = fnRegistry[idx];
  document.getElementById('code-scalar').value = fn.scalarCode;
  document.getElementById('code-neon').value   = fn.neonCode;
  document.getElementById('sig-input').value   = fn.sig;
  syncLN('code-scalar','ln-scalar');
  syncLN('code-neon','ln-neon');
  onSigChange(fn.sig);
  renderFnTabs();
  renderVecTable();
  renderAll('both');
  scheduleAutoSave();
}

function deleteFunction(idx, ev) {
  ev.stopPropagation();
  fnRegistry.splice(idx, 1);
  if (fnRegistry.length === 0) { activeFnIdx = -1; addFunction(); return; }
  selectFunction(Math.min(idx, fnRegistry.length - 1));
}

function renderFnTabs() {
  const bar = document.getElementById('fn-tabs');
  bar.innerHTML = '';
  fnRegistry.forEach((fn, i) => {
    const btn = document.createElement('button');
    btn.className = 'fn-tab' + (i === activeFnIdx ? ' active' : '');
    const name = fn.parsed?.name || fn.sig.match(/\w+\s*\(/)?.[0]?.replace('(','') || `fn${i+1}`;
    btn.innerHTML = `${name} <span class="fn-close" onclick="deleteFunction(${i},event)">×</span>`;
    btn.onclick = () => selectFunction(i);
    bar.appendChild(btn);
  });
  const add = document.createElement('button');
  add.className = 'fn-add'; add.title = 'New function'; add.textContent = '+';
  add.onclick = () => addFunction();
  bar.appendChild(add);
}

// ═══════════════════════════════════════════════════════
//  SIG UI
// ═══════════════════════════════════════════════════════
function onSigChange(val) {
  const fn = activeFn(); if (!fn) return;
  fn.sig = val;
  const parsed = parseSig(val);
  fn.parsed = parsed;
  const el = document.getElementById('sig-parsed');
  if (!val.trim()) { el.innerHTML = ''; return; }
  if (!parsed) { el.innerHTML = '<span class="sig-err">? unrecognised signature</span>'; return; }

  let rIdx = 0;
  const parts = parsed.params.map(p => {
    const k = p.kind;
    let regStr = '';
    if (k.base === 'scalar') { regStr = `<span class="sp-reg">R${rIdx++}</span>`; }
    else if (k.base === 'scalar64') { if(rIdx&1)rIdx++; regStr = `<span class="sp-reg">R${rIdx}:R${rIdx+1}</span>`; rIdx+=2; }
    else if (k.base === 'float') { regStr = `<span class="sp-reg">R${rIdx++}</span>`; }
    else if (k.base === 'ptr') { regStr = `<span class="sp-reg">R${rIdx++}</span>`; }
    return `${regStr}=<span class="sp-name">${p.name}</span>`;
  });

  el.innerHTML = parts.join('  ') + `  <span style="color:#484f58">→</span> <span class="sp-ret">R0:${parsed.returnType}</span>`;

  // Auto-label registers from param names
  parsed.params.forEach((p, i) => {
    let ri = 0;
    parsed.params.slice(0, i).forEach(pp => {
      if (pp.kind.base === 'scalar64') { if(ri&1)ri++; ri+=2; }
      else ri++;
    });
    labels.regs[ri] = p.name;
  });

  renderVecTable();
  renderAll('both');
}

// ═══════════════════════════════════════════════════════
//  EXECUTION CONTROLS (interactive step/run)
// ═══════════════════════════════════════════════════════
function applyFromInputBar(st) {
  st.regs.fill(0); st.cpsr={N:0,Z:0,C:0,V:0};
  st.neon.forEach(q=>q.fill(0)); st.memory={}; st.pc=0; st.cycles=0;
  st.changed.clear(); st.neonChg.clear(); st.flagChg.clear();
  // Apply first test vector if available, else zeros
  const fn = activeFn();
  if (fn?.parsed && fn.vectors.length > 0) {
    applyVector(st, fn.parsed, fn.vectors[0]);
  }
}

function loadCode(which) {
  const st = S[which]; clearTimer(st);
  applyFromInputBar(st);
  const lines = document.getElementById(`code-${which}`).value.split('\n');
  try {
    firstPass(lines, st);
    renderAll(which); clearLog(which);
    addLog(which, 0, 'LOAD', `${st.instructions.length} instrs`);
    setStatus(which, 'ready', `Loaded`, 0);
    setButtons(which, true);
  } catch(e) { setStatus(which,'err',`Parse:${e}`); addLog(which,0,'ERR',String(e),true); }
}

function showCurLine(which, lineNum) {
  const ta  = document.getElementById(`code-${which}`);
  const hl  = document.getElementById(`hl-${which}`);
  if (!hl || !lineNum) return;
  const LINE_H = 18, PAD_TOP = 6;
  // Auto-scroll textarea so current line is visible
  const lineTop = PAD_TOP + (lineNum - 1) * LINE_H;
  const vis = ta.clientHeight;
  if (lineTop < ta.scrollTop + PAD_TOP) ta.scrollTop = Math.max(0, lineTop - PAD_TOP);
  else if (lineTop + LINE_H > ta.scrollTop + vis) ta.scrollTop = lineTop + LINE_H - vis + PAD_TOP;
  // Position highlight relative to .ew (account for scroll)
  hl.style.top = (PAD_TOP + (lineNum - 1) * LINE_H - ta.scrollTop) + 'px';
  hl.style.display = 'block';
  // Keep highlight in sync when user scrolls
  ta._hlLine = lineNum;
}
function hideCurLine(which) {
  const hl = document.getElementById(`hl-${which}`);
  if (hl) { hl.style.display = 'none'; }
  const ta = document.getElementById(`code-${which}`);
  if (ta) ta._hlLine = null;
}

// Scroll sync is set up in INIT after DOM is ready

function step(which) {
  const st = S[which];
  if (st.pc >= st.instructions.length) { doneSim(which); return false; }
  const instr = st.instructions[st.pc]; const prev = st.pc; st.pc++; st.cycles++;
  try {
    const detail = execInstr(st, instr); st.regs[15] = st.pc;
    renderAll(which); addLog(which, prev, instr.raw.trim(), detail);
    setStatus(which, 'run', instr.raw.trim(), st.pc);
    document.getElementById('scyc').textContent = `Cycles: ${st.cycles}`;
    showCurLine(which, instr.lineNum);
    if (st.pc >= st.instructions.length) doneSim(which);
    return true;
  } catch(e) { renderAll(which); addLog(which,prev,instr.raw.trim(),String(e),true); setStatus(which,'err',`Error:${e}`,prev); setButtons(which,false,true); return false; }
}

function run(which) {
  const st = S[which]; if (st.timer) return;
  document.getElementById(`${which[0]}-run`).disabled=true;
  document.getElementById(`${which[0]}-pause`).disabled=false;
  document.getElementById(`${which[0]}-step`).disabled=true;
  const delay = Math.max(40, 1050 - document.getElementById(`spd-${which}`).value * 100);
  st.timer = setInterval(() => { if (!step(which)) clearTimer(st); }, delay);
}

function pause(which) {
  hideCurLine(which);
  clearTimer(S[which]);
  const done = S[which].pc >= S[which].instructions.length || S[which].instructions.length === 0;
  setButtons(which, !done);
  if (!done) setStatus(which,'ready','Paused',S[which].pc);
}

function reset(which) {
  const st = S[which]; clearTimer(st);
  hideCurLine(which);
  applyFromInputBar(st); st.instructions=[]; st.labels={};
  renderAll(which); clearLog(which); setButtons(which,false); setStatus(which,'','Reset','—');
}

function doneSim(which) { clearTimer(S[which]); hideCurLine(which); setButtons(which,false); setStatus(which,'done','Done',S[which].pc); }
function clearTimer(st) { if(st.timer){clearInterval(st.timer);st.timer=null;} }
function setButtons(which,enabled,errored=false){
  const p=which[0];
  document.getElementById(`${p}-step`).disabled=!enabled||errored;
  document.getElementById(`${p}-run`).disabled=!enabled||errored;
  document.getElementById(`${p}-pause`).disabled=true;
  document.getElementById(`${p}-reset`).disabled=false;
}

function runBothAndCompare() {
  ['scalar','neon'].forEach(which=>{
    const st=S[which]; clearTimer(st);
    applyFromInputBar(st);
    const lines=document.getElementById(`code-${which}`).value.split('\n');
    firstPass(lines,st);
    let g=0; while(st.pc<st.instructions.length&&g++<50000){ const instr=st.instructions[st.pc];st.pc++;st.cycles++; try{execInstr(st,instr);st.regs[15]=st.pc;}catch(e){break;} }
    for(let i=0;i<16;i++)st.changed.add(i); st.neon.forEach((_,qi)=>st.neonChg.add(qi));
  });
  renderAll('both'); renderCompare(); switchState('cmp');
  setStatus('scalar','done','Done'); setStatus('neon','done','Done');
}

function runAssertions() {
  const lines = (document.getElementById('ar-ta')?.value||'').split('\n');
  const out = document.getElementById('ar-results'); out.innerHTML='';
  lines.forEach(line => {
    line = line.trim(); if (!line || line.startsWith('//')) return;
    const m = line.match(/^R(\d+)\s*=\s*Q(\d+)\[(\d+)\]$/i);
    if (!m) { const e=document.createElement('div');e.className='ar err';e.textContent=`? ${line}`;out.appendChild(e);return; }
    const ri=+m[1],qi=+m[2],li=+m[3];
    const sv=toU32(S.scalar.regs[ri]);
    const u32=qGetU32(S.neon,qi);
    const nv=li<u32.length?u32[li]:undefined;
    const pass=nv!==undefined&&sv===nv;
    const e=document.createElement('div');e.className='ar '+(pass?'pass':'fail');
    e.textContent=pass?`✓ R${ri}(${hex8(sv)}) == Q${qi}[${li}](${hex8(nv)})`:
      `✗ R${ri}(${sv===undefined?'?':hex8(sv)}) ≠ Q${qi}[${li}](${nv===undefined?'?':hex8(nv)})`;
    out.appendChild(e);
  });
}

  NOP:  {name:'No Operation',           desc:'Does nothing for one cycle. Used for alignment or pipeline padding.',                       syn:'NOP'},
  // ── Branches ──
  B:    {name:'Branch',                 desc:'Unconditional jump to label.',                                                              syn:'B label'},
  BL:   {name:'Branch with Link',       desc:'Jump to label and save the return address in LR (R14).',                                    syn:'BL label'},
  BX:   {name:'Branch and Exchange',    desc:'Jump to address in Rm. If Rm[0]=1, switches to Thumb mode.',                               syn:'BX Rm'},
  BEQ:  {name:'Branch if Equal',        desc:'Branch if Z = 1  (previous result was zero / equal).',                                     syn:'BEQ label'},
  BNE:  {name:'Branch if Not Equal',    desc:'Branch if Z = 0  (previous result was non-zero / not equal).',                             syn:'BNE label'},
  BLT:  {name:'Branch if Less Than',    desc:'Branch if N ≠ V  (signed less than).',                                                     syn:'BLT label'},
  BLE:  {name:'Branch if Less/Equal',   desc:'Branch if Z = 1 or N ≠ V  (signed ≤).',                                                   syn:'BLE label'},
  BGT:  {name:'Branch if Greater Than', desc:'Branch if Z = 0 and N = V  (signed greater than).',                                        syn:'BGT label'},
  BGE:  {name:'Branch if Greater/Equal',desc:'Branch if N = V  (signed ≥).',                                                             syn:'BGE label'},
  BCS:  {name:'Branch if Carry Set',    desc:'Branch if C = 1  (unsigned ≥, or addition produced a carry).',                             syn:'BCS label'},
  BCC:  {name:'Branch if Carry Clear',  desc:'Branch if C = 0  (unsigned <).',                                                           syn:'BCC label'},
  BMI:  {name:'Branch if Minus',        desc:'Branch if N = 1  (result was negative).',                                                  syn:'BMI label'},
  BPL:  {name:'Branch if Plus',         desc:'Branch if N = 0  (result was non-negative).',                                              syn:'BPL label'},
  BHI:  {name:'Branch if Higher',       desc:'Branch if C = 1 and Z = 0  (unsigned >).',                                                 syn:'BHI label'},
  BLS:  {name:'Branch if Lower/Same',   desc:'Branch if C = 0 or Z = 1  (unsigned ≤).',                                                 syn:'BLS label'},
  // ── NEON ──
  VMOV: {name:'NEON Move / Transfer',   desc:'Copy a Q/D register, broadcast an immediate, or transfer between ARM and NEON registers.', syn:'VMOV Qd, Qn  |  VMOV Rd, Sn'},
  VADD: {name:'NEON Vector Add',        desc:'Adds corresponding lanes: Qd[i] = Qn[i] + Qm[i].',                                        syn:'VADD.I32 Qd, Qn, Qm',     note:'Type suffix: I8 I16 I32 F32'},
  VSUB: {name:'NEON Vector Subtract',   desc:'Subtracts lanes: Qd[i] = Qn[i] − Qm[i].',                                                 syn:'VSUB.I32 Qd, Qn, Qm'},
  VMUL: {name:'NEON Vector Multiply',   desc:'Multiplies lanes: Qd[i] = Qn[i] × Qm[i].',                                                syn:'VMUL.I32 Qd, Qn, Qm'},
  VMLA: {name:'NEON Multiply-Accumulate',desc:'Qd[i] += Qn[i] × Qm[i].  Accumulates into Qd.',                                         syn:'VMLA.I32 Qd, Qn, Qm'},
  VAND: {name:'NEON Bitwise AND',       desc:'Qd = Qn & Qm  (bitwise, all lanes).',                                                     syn:'VAND Qd, Qn, Qm'},
  VORR: {name:'NEON Bitwise OR',        desc:'Qd = Qn | Qm  (bitwise, all lanes).',                                                     syn:'VORR Qd, Qn, Qm'},
  VEOR: {name:'NEON Bitwise XOR',       desc:'Qd = Qn ^ Qm  (bitwise, all lanes).',                                                     syn:'VEOR Qd, Qn, Qm'},
  VMAX: {name:'NEON Lane Maximum',      desc:'Qd[i] = max(Qn[i], Qm[i]).',                                                              syn:'VMAX.S32 Qd, Qn, Qm'},
  VMIN: {name:'NEON Lane Minimum',      desc:'Qd[i] = min(Qn[i], Qm[i]).',                                                              syn:'VMIN.S32 Qd, Qn, Qm'},
  VSHL: {name:'NEON Shift Left',        desc:'Qd[i] = Qm[i] << #imm  (logical left shift per lane).',                                   syn:'VSHL.I32 Qd, Qm, #imm'},
  VSHR: {name:'NEON Shift Right',       desc:'Qd[i] = Qm[i] >> #imm.  U = unsigned (zero-fill), S = signed (sign-fill).',               syn:'VSHR.U32 Qd, Qm, #imm'},
  VDUP: {name:'NEON Duplicate / Broadcast',desc:'Copies an ARM register or scalar into every lane of Qd.',                              syn:'VDUP.32 Qd, Rm'},
  VLD1: {name:'NEON Load (1 struct)',   desc:'Loads consecutive 32-bit elements from memory into one Q register (4 lanes).',             syn:'VLD1.32 {Qd}, [Rn]',      note:'Rn is byte address. No auto-increment.'},
  VST1: {name:'NEON Store (1 struct)',  desc:'Stores 4 consecutive 32-bit elements from Qd to memory.',                                  syn:'VST1.32 {Qd}, [Rn]'},
  VLD2: {name:'NEON Load (2 interleaved)',desc:'Loads interleaved pairs from memory: even elements → Qd, odd elements → Qd+1.',         syn:'VLD2.32 {Qd, Qd+1}, [Rn]'},
  VST2: {name:'NEON Store (2 interleaved)',desc:'Stores two Q registers interleaved to memory.',                                          syn:'VST2.32 {Qd, Qd+1}, [Rn]'},
  VPADD:{name:'NEON Pairwise Add',      desc:'Adds adjacent pairs within each D register.\nDd[0]=Dn[0]+Dn[1],  Dd[1]=Dm[0]+Dm[1].',    syn:'VPADD.I32 Dd, Dn, Dm',    note:'Operates on D (64-bit) registers, not Q.'},
  VNEG: {name:'NEON Negate',            desc:'Qd[i] = −Qm[i] for each lane.',                                                            syn:'VNEG.S32 Qd, Qm'},
  VABS: {name:'NEON Absolute Value',    desc:'Qd[i] = |Qm[i]| for each lane.',                                                           syn:'VABS.S32 Qd, Qm'},
  VCEQ: {name:'NEON Compare Equal',     desc:'Qd[i] = 0xFFFFFFFF if Qn[i] == Qm[i], else 0.',                                           syn:'VCEQ.I32 Qd, Qn, Qm'},
  VCGT: {name:'NEON Compare Greater',   desc:'Qd[i] = 0xFFFFFFFF if Qn[i] > Qm[i], else 0.',                                            syn:'VCGT.S32 Qd, Qn, Qm'},
  VCLT: {name:'NEON Compare Less',      desc:'Qd[i] = 0xFFFFFFFF if Qn[i] < Qm[i], else 0.',                                            syn:'VCLT.S32 Qd, Qn, Qm'},
  SUBS: {name:'Subtract + Set Flags',   desc:'Rd = Rn − op2, then updates N, Z, C, V.  Often used as loop counter decrement.',           syn:'SUBS Rd, Rn, <op2>'},
};

function lookupInstrRef(tok) {
  const mn = tok.toUpperCase().replace(/\..*$/, ''); // strip type suffix (.I32 etc)
  if (INSTR_REF[mn]) return { mn, ...INSTR_REF[mn] };
  // conditional branch: BLT → BLT, BNE → BNE (already in table)
  // conditional MOV: MOVNE → MOV, MOVEQ → MOV etc.
  const condMov = mn.match(/^(MOV|ADD|SUB|AND|ORR|EOR|RSB|MUL|LDR|STR|MVN)(S?)(EQ|NE|LT|LE|GT|GE|CS|CC|MI|PL|HI|LS|AL)$/);
  if (condMov && INSTR_REF[condMov[1]]) {
    const cc = condMov[3];
    return { mn, ...INSTR_REF[condMov[1]], name: INSTR_REF[condMov[1]].name + ` (if ${cc})` };
  }
  return null;
}

function showInstrTT(x, y, info) {
  const tt = document.getElementById('instr-tt');
  tt.innerHTML = `<div class="it-mn">${info.mn}</div>
<div class="it-name">${info.name}</div>
<div class="it-desc">${info.desc.replace(/\n/g,'<br>')}</div>
<code class="it-syn">${info.syn}</code>
${info.note ? `<div class="it-note">⚑ ${info.note}</div>` : ''}`;
  tt.style.display = 'block';
  let left = x + 18, top = y + 14;
  tt.style.left = left+'px'; tt.style.top = top+'px';
  const r = tt.getBoundingClientRect();
  if (r.right  > window.innerWidth  - 8) tt.style.left = (x - r.width  - 8) + 'px';
  if (r.bottom > window.innerHeight - 8) tt.style.top  = (y - r.height - 8) + 'px';
}
function hideInstrTT() { document.getElementById('instr-tt').style.display = 'none'; }

function setupInstrHover(taId) {
  const ta = document.getElementById(taId);
  let LINE_H = 0, PAD = 0;
  let lastLineIdx = -1;
  ta.addEventListener('mousemove', e => {
    if (!LINE_H) {
      const cs = getComputedStyle(ta);
      LINE_H = parseFloat(cs.lineHeight) || 18;
      PAD    = parseFloat(cs.paddingTop)  || 6;
    }
    const rect = ta.getBoundingClientRect();
    const y = e.clientY - rect.top + ta.scrollTop - PAD;
    const lineIdx = Math.floor(y / LINE_H);
    if (lineIdx === lastLineIdx) return;
    lastLineIdx = lineIdx;
    const lines = ta.value.split('\n');
    if (lineIdx < 0 || lineIdx >= lines.length) { hideInstrTT(); return; }
    const line = lines[lineIdx].trim().replace(/\/\/.*$/, '').replace(/;.*$/, '').trim();
    if (!line || line.endsWith(':')) { hideInstrTT(); return; }
    const tok = line.split(/[\s,]+/)[0];
    const info = lookupInstrRef(tok);
    if (info) showInstrTT(e.clientX, e.clientY, info);
    else hideInstrTT();
  });
  ta.addEventListener('scroll', () => { lastLineIdx = -1; });
  ta.addEventListener('mouseleave', () => { hideInstrTT(); lastLineIdx = -1; });
}

// ═══════════════════════════════════════════════════════
//  UNICORN + KEYSTONE ENGINE
// ═══════════════════════════════════════════════════════
let ucMod = null, ksMod = null, enginesReady = false;

function setEngBadge(state, text) {
  const b = document.getElementById('eng-badge');
  if (!b) return;
  b.textContent = text;
  b.style.background = state==='ready'?'#1a4d2a':state==='error'?'#3a1010':'#0f4a0f';
  b.style.borderColor = state==='ready'?'#3fb950':state==='error'?'#da3633':'#388bfd';
  b.style.color       = state==='ready'?'#3fb950':state==='error'?'#f85149':'#388bfd';
}

async function initEngines() {
  setEngBadge('loading','Engine: loading…');
  try {
    ucMod = await MUnicorn();
    ksMod = await MKeystone();
    enginesReady = true;
    setEngBadge('ready','Engine: QEMU ready');
  } catch(e) {
    setEngBadge('error','Engine: failed');
    console.error('Engine init failed:', e);
  }
}

function mc2bytes(mc) {
  const b = new Uint8Array(Object.keys(mc).length);
  Object.keys(mc).forEach(k => b[+k] = mc[+k]);
  return b;
}

function stripComments(src) {
  return src.split('\n').map(l => {
    const i = l.indexOf('//');
    return i >= 0 ? l.slice(0, i) : l;
  }).join('\n');
}

function applyVecToUnicorn(mu, uc, parsed, vectorObj) {
  if (!parsed) return {};
  const MEM_DATA = 0x100000;
  let rIdx = 0;
  let memPtr = MEM_DATA;
  const ptrs = {};

  parsed.params.forEach(p => {
    const raw = vectorObj[p.name];
    const k   = p.kind;

    if (k.base === 'scalar') {
      mu.reg_write_i32(uc[`ARM_REG_R${rIdx++}`], (parseInt(raw) || 0) | 0);

    } else if (k.base === 'scalar64') {
      if (rIdx & 1) rIdx++;
      const v = parseInt(raw) || 0;
      mu.reg_write_i32(uc[`ARM_REG_R${rIdx++}`], v & 0xFFFFFFFF);
      mu.reg_write_i32(uc[`ARM_REG_R${rIdx++}`], Math.floor(v / 2**32) | 0);

    } else if (k.base === 'float') {
      const f = parseFloat(raw) || 0;
      mu.reg_write_i32(uc[`ARM_REG_R${rIdx++}`], new Int32Array(new Float32Array([f]).buffer)[0]);

    } else if (k.base === 'ptr') {
      const arr = parseArr(raw);
      const es  = k.elemSize || 4;
      ptrs[p.name] = { addr: memPtr, count: arr.length, elemSize: es };
      const buf = new Uint8Array(Math.max(arr.length, 1) * es);
      const view = new DataView(buf.buffer);
      arr.forEach((v, i) => view.setInt32(i * es, v | 0, true));
      mu.mem_write(memPtr, buf);
      mu.reg_write_i32(uc[`ARM_REG_R${rIdx++}`], memPtr);
      memPtr += buf.length;
    }
  });

  return ptrs;
}

async function runWithUnicorn(which, parsed, vectorObj) {
  const uc = ucMod, ks = ksMod;
  const ksh = new ks.Keystone(ks.ARCH_ARM, ks.MODE_ARM);
  const src = stripComments(document.getElementById(`code-${which}`).value);
  const asmResult = ksh.asm(src, 0x8000);
  ksh.close();
  if (asmResult.failed || !asmResult.mc || Object.keys(asmResult.mc).length === 0)
    throw new Error('Assembly failed');
  const codeBytes = mc2bytes(asmResult.mc);

  const mu = new uc.Unicorn(uc.ARCH_ARM, uc.MODE_ARM);
  // Enable VFP/NEON
  mu.reg_write_i32(uc.ARM_REG_C1_C0_2, 0xF << 20);
  mu.reg_write_i32(uc.ARM_REG_FPEXC, 0x40000000);
  // Code region
  mu.mem_map(0x8000, 0x8000, uc.PROT_ALL);
  mu.mem_write(0x8000, codeBytes);
  // Data region (for pointer args)
  mu.mem_map(0x100000, 0x100000, uc.PROT_ALL);
  // Stack region
  mu.mem_map(0x200000, 0x10000, uc.PROT_ALL);
  mu.reg_write_i32(uc.ARM_REG_SP, 0x20FFFC);

  const ptrs = applyVecToUnicorn(mu, uc, parsed, vectorObj);
  mu.emu_start(0x8000, 0x8000 + codeBytes.length, 0, 1000000);

  // Read back GP regs
  const st = makeState();
  [uc.ARM_REG_R0,uc.ARM_REG_R1,uc.ARM_REG_R2,uc.ARM_REG_R3,
   uc.ARM_REG_R4,uc.ARM_REG_R5,uc.ARM_REG_R6,uc.ARM_REG_R7,
   uc.ARM_REG_R8,uc.ARM_REG_R9,uc.ARM_REG_R10,uc.ARM_REG_R11,
   uc.ARM_REG_R12,uc.ARM_REG_SP,uc.ARM_REG_LR,uc.ARM_REG_PC
  ].forEach((r, i) => { st.regs[i] = mu.reg_read_i32(r); st.changed.add(i); });

  // Read back NEON Q regs via S regs
  for (let qi = 0; qi < 16; qi++) {
    const view = new DataView(st.neon[qi].buffer);
    for (let lane = 0; lane < 4; lane++) {
      const sReg = uc[`ARM_REG_S${qi * 4 + lane}`];
      if (sReg !== undefined) {
        try { view.setInt32(lane * 4, mu.reg_read_i32(sReg), true); } catch(e) {}
      }
    }
    st.neonChg.add(qi);
  }

  // Read output pointer arrays from emulated memory
  const outPtrs = {};
  if (parsed) parsed.params.forEach(p => {
    if (p.kind.base === 'ptr' && ptrs[p.name]) {
      const { addr, count, elemSize } = ptrs[p.name];
      const raw = mu.mem_read(addr, count * elemSize);
      const view = new DataView(raw.buffer || new Uint8Array(raw).buffer);
      outPtrs[p.name] = Array.from({ length: count }, (_, i) =>
        view.getInt32(i * elemSize, true));
    }
  });

  mu.close();
  return { st, retVal: toS32(st.regs[0]), outPtrs };
}

//  LOCALSTORAGE PERSISTENCE
// ═══════════════════════════════════════════════════════
const LS_KEY = 'neonforge_fns';

function saveToStorage() {
  // Flush current editor content before saving
  if (activeFnIdx >= 0 && fnRegistry[activeFnIdx]) {
    fnRegistry[activeFnIdx].scalarCode = document.getElementById('code-scalar').value;
    fnRegistry[activeFnIdx].neonCode   = document.getElementById('code-neon').value;
    fnRegistry[activeFnIdx].sig        = document.getElementById('sig-input').value;
  }
  const data = fnRegistry.map(fn => ({
    sig: fn.sig, scalarCode: fn.scalarCode, neonCode: fn.neonCode, vectors: fn.vectors
  }));
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(data));
    const btn = document.getElementById('save-btn');
    if (btn) { const orig = btn.textContent; btn.textContent = 'Saved!'; setTimeout(() => btn.textContent = orig, 1200); }
  } catch(e) { alert('localStorage save failed: ' + e.message); }
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!Array.isArray(data) || data.length === 0) return false;
    data.forEach((d, i) => {
      addFunction(d.sig || '', d.scalarCode || '', d.neonCode || '');
      const fn = activeFn();
      fn.vectors = Array.isArray(d.vectors) ? d.vectors : [];
      fn.results = fn.vectors.map(() => null);
    });
    selectFunction(0);
    return true;
  } catch(e) { return false; }
}

// Auto-save on code/sig edits (debounced)
let _saveTimer = null;
function scheduleAutoSave() { clearTimeout(_saveTimer); _saveTimer = setTimeout(saveToStorage, 1500); }
document.getElementById('code-scalar').addEventListener('input', scheduleAutoSave);
document.getElementById('code-neon').addEventListener('input', scheduleAutoSave);
document.getElementById('sig-input').addEventListener('input', scheduleAutoSave);

// ═══════════════════════════════════════════════════════
//  ASM EXPORT
// ═══════════════════════════════════════════════════════
function exportASM() {
  // Flush editor state
  if (activeFnIdx >= 0 && fnRegistry[activeFnIdx]) {
    fnRegistry[activeFnIdx].scalarCode = document.getElementById('code-scalar').value;
    fnRegistry[activeFnIdx].neonCode   = document.getElementById('code-neon').value;
    fnRegistry[activeFnIdx].sig        = document.getElementById('sig-input').value;
  }
  const fn = activeFn();
  if (!fn) return;

  const name   = fn.parsed?.name || 'fn';
  const sig    = fn.sig || '@ (no signature)';
  const header = `@ ARM assembly export: ${name}
@ Generated by NEONForge
@
@ Signature: ${sig}
`;

  function fmtBlock(code, label) {
    const lines = code.split('\n').map(l => {
      const stripped = l.replace(/\/\/.*$/, '').trimEnd();
      return stripped ? '    ' + stripped : '';
    }).join('\n');
    return `
@ ── ${label} ──────────────────────────────────────────
    .text
    .arm
    .global ${label}
    .type   ${label}, %function
${label}:
${lines}

    .size ${label}, .-${label}
`;
  }

  const text = header
    + fmtBlock(fn.scalarCode, name + '_scalar')
    + fmtBlock(fn.neonCode,   name + '_neon');

  const blob = new Blob([text], { type: 'text/plain' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = name + '.s'; a.click();
  URL.revokeObjectURL(url);
}

}
